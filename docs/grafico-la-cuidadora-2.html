<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0" />
<title>Diagnóstico Express · La Hija Cuidadora</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#fff;
color:#1a1a1a;
font-family:'DM Sans',sans-serif;
overflow-x:hidden;
}

.wrap{
max-width:520px;
margin:auto;
padding:24px 18px 50px;
}

.eyebrow{
font-size:11px;
letter-spacing:2px;
text-transform:uppercase;
color:#999;
text-align:center;
margin-bottom:10px;
}

h1{
font-family:'Playfair Display',serif;
font-size:32px;
line-height:1.18;
text-align:center;
margin-bottom:12px;
}

.sub{
text-align:center;
font-size:15px;
color:#666;
line-height:1.6;
margin-bottom:26px;
}

.card{
background:#faf8f5;
border:1px solid #eee7de;
border-radius:18px;
padding:22px;
margin-bottom:18px;
box-shadow:0 8px 20px rgba(0,0,0,.04);
}

.center{text-align:center}

.gauge-wrap{
margin-bottom:10px;
}

.gauge{
width:160px;
height:160px;
margin:auto;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
position:relative;
background:conic-gradient(#117A65 0deg,#e9e5df 0deg);
transition:all .6s ease;
}

.gauge::before{
content:"";
position:absolute;
width:118px;
height:118px;
background:#fff;
border-radius:50%;
}

.gauge-inner{
position:relative;
z-index:2;
text-align:center;
}

.percent{
font-family:'Playfair Display',serif;
font-size:38px;
line-height:1;
}

.small{
font-size:12px;
color:#888;
margin-top:4px;
}

.badge{
display:inline-block;
margin-top:14px;
padding:8px 14px;
border-radius:999px;
font-size:12px;
font-weight:700;
}

.block-title{
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
color:#999;
margin-bottom:12px;
}

.big{
font-family:'Playfair Display',serif;
font-size:26px;
line-height:1.25;
margin-bottom:10px;
}

.txt{
font-size:15px;
line-height:1.65;
color:#555;
}

.signal{
padding:14px 0;
border-bottom:1px solid #ece8e2;
}

.signal:last-child{border:none;padding-bottom:0}

.signal-title{
font-weight:700;
font-size:15px;
margin-bottom:4px;
}

.signal-desc{
font-size:14px;
line-height:1.55;
color:#666;
}

.reveal{
opacity:0;
transform:translateY(18px);
transition:.7s ease;
}

.reveal.show{
opacity:1;
transform:none;
}

.btn{
width:100%;
border:none;
padding:18px 20px;
border-radius:16px;
font-size:17px;
font-weight:700;
cursor:pointer;
color:#fff;
margin-top:14px;
animation:pulse 2s infinite;
box-shadow:0 10px 24px rgba(0,0,0,.14);
}

@keyframes pulse{
0%,100%{transform:scale(1)}
50%{transform:scale(1.02)}
}

.micro{
text-align:center;
font-size:12px;
color:#999;
margin-top:10px;
line-height:1.5;
}

.progress{
height:7px;
background:#ece8e2;
border-radius:999px;
overflow:hidden;
margin-bottom:18px;
}

.bar{
height:100%;
width:0%;
background:#117A65;
transition:width 1s ease;
}

.loading{
font-size:14px;
text-align:center;
color:#777;
margin-bottom:18px;
min-height:20px;
}

</style>
</head>
<body>

<div class="wrap">

<div class="progress"><div class="bar" id="bar"></div></div>
<div class="loading" id="loading">Analizando tus respuestas...</div>

<div class="reveal" id="hero">
<div class="eyebrow">Tu diagnóstico personalizado</div>
<h1>La Supervivencia<br>de la Hija Cuidadora</h1>
<p class="sub" id="sub"></p>
</div>

<div class="card center reveal" id="gaugeCard">
<div class="gauge-wrap">
<div class="gauge" id="gauge">
<div class="gauge-inner">
<div class="percent" id="pct">0%</div>
<div class="small">Nivel detectado</div>
</div>
</div>
</div>
<div class="badge" id="badge"></div>
</div>

<div class="card reveal" id="found">
<div class="block-title">Lo que encontramos</div>
<div class="big" id="title"></div>
<div class="txt" id="desc"></div>
</div>

<div class="card reveal" id="signalsBox">
<div class="block-title">Señales en tus respuestas</div>
<div id="signals"></div>
</div>

<div class="card reveal" id="bridge">
<div class="txt" id="bridgeText"></div>

<button class="btn" id="cta">▶ Ver el video ahora</button>

<div class="micro">
Solo toma 2 minutos · Puede cambiar cómo vives el cuidado desde hoy
</div>
</div>

</div>

<script>
const variants = [
{
pct:87,
color:"#C0392B",
badgeBg:"#FDECEA",
badgeColor:"#922B21",
badge:"Alerta roja · Agotamiento crítico",
sub:"Tus respuestas revelan algo urgente que necesitas ver.",
title:"El Ciclo del Agotamiento Invisible",
desc:"Has sostenido demasiado sola durante demasiado tiempo. No estás fallando: estás sobrecargada.",
signals:[
["Tu cuerpo está avisando","El cansancio ya no se resuelve solo descansando."],
["Vives en alerta","Tu mente sigue trabajando incluso de noche."],
["Te olvidaste de ti","Tus necesidades quedaron en pausa."]
],
bridge:"Lo que sientes tiene solución. Mira este breve video y descubre qué cambiar primero."
},
{
pct:65,
color:"#B7770D",
badgeBg:"#FEF3DC",
badgeColor:"#7D5A0D",
badge:"Zona de riesgo · Desgaste acumulado",
sub:"Tus respuestas muestran algo que no deberías seguir ignorando.",
title:"La Trampa de la Culpa Silenciosa",
desc:"Cuidas desde la responsabilidad, pero eso te está drenando por dentro.",
signals:[
["La culpa te mueve","Y eso agota más de lo que imaginas."],
["Tu identidad se apagó","Todo gira alrededor del cuidado."],
["No descansas de verdad","Tu mente nunca desconecta."]
],
bridge:"No necesitas más fuerza. Necesitas método. Mira esto ahora."
},
{
pct:48,
color:"#117A65",
badgeBg:"#D5F5E3",
badgeColor:"#0E6655",
badge:"Zona de oportunidad · Aún estás a tiempo",
sub:"Estás más cerca de la solución de lo que imaginas.",
title:"El Límite del Cuidador Funcional",
desc:"Sigues adelante... pero a costa de tu paz mental.",
signals:[
["Todo depende de ti","Eso no es sostenible."],
["Pedir ayuda pesa","Delegar te hace sentir culpa."],
["Vas en automático","Y eso también desgasta."]
],
bridge:"Todavía es reversible. Mira este video y entiende qué hacer primero."
}
];

const v = variants[Math.floor(Math.random()*variants.length)];

const loadingTexts = [
"Analizando tus respuestas...",
"Detectando patrones emocionales...",
"Preparando tu resultado personalizado..."
];

let li=0;
const loading = document.getElementById("loading");
const interval = setInterval(()=>{
loading.innerText = loadingTexts[li];
li++;
if(li>=loadingTexts.length){
clearInterval(interval);
showResult();
}
},1200);

function showResult(){

document.getElementById("bar").style.width="100%";
loading.style.display="none";

document.getElementById("sub").innerText=v.sub;
document.getElementById("badge").innerText=v.badge;
document.getElementById("badge").style.background=v.badgeBg;
document.getElementById("badge").style.color=v.badgeColor;

document.getElementById("title").innerText=v.title;
document.getElementById("desc").innerText=v.desc;
document.getElementById("bridgeText").innerText=v.bridge;

document.getElementById("cta").style.background=v.color;

let deg=0;
const finalDeg = (v.pct/100)*360;
let num=0;

const gauge = document.getElementById("gauge");
const pct = document.getElementById("pct");

const anim = setInterval(()=>{
deg += finalDeg/40;
num += v.pct/40;

if(deg>=finalDeg){
deg=finalDeg;
num=v.pct;
clearInterval(anim);
}

gauge.style.background=`conic-gradient(${v.color} ${deg}deg,#e9e5df 0deg)`;
pct.innerText=Math.round(num)+"%";

},25);

const box=document.getElementById("signals");

v.signals.forEach(s=>{
const div=document.createElement("div");
div.className="signal";
div.innerHTML=`
<div class="signal-title">${s[0]}</div>
<div class="signal-desc">${s[1]}</div>
`;
box.appendChild(div);
});

document.querySelectorAll(".reveal").forEach((el,i)=>{
setTimeout(()=>{
el.classList.add("show");
},300+(i*250));
});

}

document.getElementById("cta").onclick=function(){
window.location.href="#video";
};
</script>

</body>
</html>
