<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Diagnóstico Express</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#ffffff;
font-family:'DM Sans',sans-serif;
color:#1a1a1a;
}

.wrap{
max-width:520px;
margin:auto;
padding:24px 18px 24px;
}

.eyebrow{
text-align:center;
font-size:11px;
letter-spacing:2px;
text-transform:uppercase;
color:#999;
margin-bottom:10px;
}

h1{
font-family:'Playfair Display',serif;
font-size:30px;
line-height:1.15;
text-align:center;
margin-bottom:12px;
}

.sub{
text-align:center;
font-size:15px;
line-height:1.6;
color:#666;
margin-bottom:22px;
}

.card{
background:#faf8f5;
border:1px solid #eee7de;
border-radius:18px;
padding:22px;
margin-bottom:16px;
box-shadow:0 8px 18px rgba(0,0,0,.04);
}

.center{text-align:center}

.gauge{
width:170px;
height:170px;
margin:auto;
border-radius:50%;
position:relative;
display:flex;
align-items:center;
justify-content:center;
background:conic-gradient(#117A65 0deg,#ece8e2 0deg);
transition:all .6s ease;
}

.gauge::before{
content:"";
position:absolute;
width:126px;
height:126px;
border-radius:50%;
background:#fff;
}

.gauge-inner{
position:relative;
z-index:2;
text-align:center;
}

.percent{
font-family:'Playfair Display',serif;
font-size:42px;
line-height:1;
}

.percent-sub{
font-size:12px;
color:#888;
margin-top:4px;
}

.badge{
display:inline-block;
margin-top:14px;
padding:8px 14px;
border-radius:999px;
font-size:12px;
font-weight:700;
}

.label{
font-size:11px;
letter-spacing:2px;
text-transform:uppercase;
color:#999;
margin-bottom:10px;
}

.big{
font-family:'Playfair Display',serif;
font-size:25px;
line-height:1.2;
margin-bottom:10px;
}

.txt{
font-size:15px;
line-height:1.65;
color:#555;
}

.signal{
padding:12px 0;
border-bottom:1px solid #ece8e2;
}

.signal:last-child{
border:none;
padding-bottom:0;
}

.signal strong{
display:block;
font-size:15px;
color:#1a1a1a;
margin-bottom:4px;
}

.signal span{
font-size:14px;
line-height:1.55;
color:#666;
display:block;
}

.highlight{
font-weight:700;
color:#1a1a1a;
}

.final-call{
text-align:center;
padding:4px 4px 0;
}

.final-call .line1{
font-size:16px;
font-weight:700;
line-height:1.5;
margin-bottom:10px;
color:#1a1a1a;
}

.final-call .line2{
font-size:14px;
line-height:1.6;
color:#666;
margin-bottom:12px;
}

.arrow{
font-size:28px;
animation:bounce 1.6s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(8px)}
}

.reveal{
opacity:0;
transform:translateY(18px);
transition:.7s ease;
}

.reveal.show{
opacity:1;
transform:none;
}

.loading{
text-align:center;
font-size:14px;
color:#777;
margin-bottom:16px;
min-height:18px;
}

.progress{
height:7px;
background:#ece8e2;
border-radius:999px;
overflow:hidden;
margin-bottom:16px;
}

.bar{
height:100%;
width:0%;
background:#117A65;
transition:width 1s ease;
}
</style>
</head>
<body>

<div class="wrap">

<div class="progress"><div class="bar" id="bar"></div></div>
<div class="loading" id="loading">Analizando tus respuestas...</div>

<div class="reveal">
<div class="eyebrow">Tu diagnóstico personalizado</div>
<h1>La Supervivencia<br>de la Hija Cuidadora</h1>
<p class="sub" id="sub"></p>
</div>

<div class="card center reveal">
<div class="gauge" id="gauge">
<div class="gauge-inner">
<div class="percent" id="pct">0%</div>
<div class="percent-sub">Nivel detectado</div>
</div>
</div>

<div class="badge" id="badge"></div>
</div>

<div class="card reveal">
<div class="label">Lo que encontramos</div>
<div class="big" id="title"></div>
<div class="txt" id="desc"></div>
</div>

<div class="card reveal">
<div class="label">Señales en tus respuestas</div>
<div id="signals"></div>
</div>

<div class="card reveal">
<div class="final-call">
<div class="line1">Lo que sigue puede ayudarte más de lo que imaginas</div>
<div class="line2">Continúa abajo para descubrir qué cambiar primero y sentir alivio real.</div>
<div class="arrow">👇</div>
</div>
</div>

</div>

<script>
const data = [
{
pct:87,
color:"#C0392B",
badgeBg:"#FDECEA",
badgeColor:"#922B21",
badge:"Alerta roja · Agotamiento crítico",
sub:"Tus respuestas revelan algo urgente que necesitas ver.",
title:"El Ciclo del Agotamiento Invisible",
desc:"Has sostenido demasiado sola durante demasiado tiempo. <span class='highlight'>No estás fallando:</span> estás sobrecargada.",
signals:[
["Tu cuerpo está avisando","El cansancio ya no se resuelve solo descansando."],
["Vives en alerta","Tu mente sigue trabajando incluso de noche."],
["Te olvidaste de ti","Tus necesidades quedaron en pausa."]
]
},
{
pct:65,
color:"#B7770D",
badgeBg:"#FEF3DC",
badgeColor:"#7D5A0D",
badge:"Zona de riesgo · Desgaste acumulado",
sub:"Tus respuestas muestran algo que no deberías seguir ignorando.",
title:"La Trampa de la Culpa Silenciosa",
desc:"Cuidas desde la responsabilidad, pero eso te está drenando por dentro.",
signals:[
["La culpa te mueve","Y eso agota más de lo que imaginas."],
["Tu identidad quedó atrás","Todo gira alrededor del cuidado."],
["No descansas de verdad","Tu mente nunca desconecta."]
]
},
{
pct:48,
color:"#117A65",
badgeBg:"#D5F5E3",
badgeColor:"#0E6655",
badge:"Zona de oportunidad · Aún estás a tiempo",
sub:"Estás más cerca de la solución de lo que imaginas.",
title:"El Límite del Cuidador Funcional",
desc:"Sigues adelante... pero a costa de tu paz mental.",
signals:[
["Todo depende de ti","Eso no es sostenible."],
["Pedir ayuda pesa","Delegar te hace sentir culpa."],
["Vas en automático","Y eso también desgasta."]
]
}
];

const v = data[Math.floor(Math.random()*data.length)];

const loadingTexts = [
"Analizando tus respuestas...",
"Detectando patrones emocionales...",
"Preparando tu resultado personalizado..."
];

let step = 0;
const loading = document.getElementById("loading");

const timer = setInterval(()=>{
loading.innerText = loadingTexts[step];
step++;

if(step >= loadingTexts.length){
clearInterval(timer);
render();
}
},1100);

function render(){

document.getElementById("bar").style.width="100%";

document.getElementById("sub").innerText = v.sub;
document.getElementById("badge").innerText = v.badge;
document.getElementById("badge").style.background = v.badgeBg;
document.getElementById("badge").style.color = v.badgeColor;

document.getElementById("title").innerText = v.title;
document.getElementById("desc").innerHTML = v.desc;

let deg = 0;
let val = 0;
const target = (v.pct/100)*360;

const gauge = document.getElementById("gauge");
const pct = document.getElementById("pct");

const anim = setInterval(()=>{
deg += target/40;
val += v.pct/40;

if(deg >= target){
deg = target;
val = v.pct;
clearInterval(anim);
}

gauge.style.background = `conic-gradient(${v.color} ${deg}deg,#ece8e2 0deg)`;
pct.innerText = Math.round(val) + "%";

},25);

const s = document.getElementById("signals");

v.signals.forEach(item=>{
const div = document.createElement("div");
div.className = "signal";
div.innerHTML = `
<strong>${item[0]}</strong>
<span>${item[1]}</span>
`;
s.appendChild(div);
});

document.querySelectorAll(".reveal").forEach((el,i)=>{
setTimeout(()=>{
el.classList.add("show");
},250 + (i*220));
});

loading.style.display="none";
}
</script>

</body>
</html>
