<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barra de Progreso</title>

    <!-- Bootstrap -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f4f7f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .progress-component-container {
            max-width: 500px;
            width: 100%;
            margin: 80px auto;
        }

        .quiz-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 22px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            color: white;
        }

        .quiz-title {
            margin-bottom: 18px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: 600;
        }

        .progress {
            height: 38px;
            border-radius: 20px;
            overflow: hidden;
            background-color: rgba(255,255,255,0.3);
        }

        .progress-bar {
            font-size: 18px;
            font-weight: bold;
            line-height: 38px;
            transition: width 1.2s ease;
        }

        .quiz-message {
            margin-top: 14px;
            font-size: 16px;
            line-height: 1.4;
        }
    </style>
</head>

<body>

<div class="progress-component-container">
    <div class="quiz-container">

        <div class="quiz-title">🚀 ¡Tu progreso en el flujo!</div>

        <div class="progress-stats">
            <span id="progressValues"></span>
            <span id="progressPercentage"></span>
        </div>

        <div class="progress">
            <div 
                id="flowProgress"
                class="progress-bar progress-bar-striped progress-bar-animated"
                style="width: 0%">
            </div>
        </div>

        <div class="quiz-message" id="motivationalMessage">
            Cargando tu progreso...
        </div>

    </div>
</div>

<script>
window.onload = function () {

    const progressBar = document.getElementById('flowProgress');
    const progressPercentageEl = document.getElementById('progressPercentage');
    const progressValuesEl = document.getElementById('progressValues');
    const motivationalMessageEl = document.getElementById('motivationalMessage');

    const TOTAL_STEPS = 4;
    const CURRENT_STEP = 3;

    function getRandom(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function generateProgress() {

        const percentage = getRandom(80, 87); // 🔥 variação inteligente

        progressBar.style.width = percentage + '%';
        progressPercentageEl.textContent = percentage + '%';
        progressValuesEl.textContent = `Paso ${CURRENT_STEP} de ${TOTAL_STEPS}`;

        progressBar.className = 'progress-bar progress-bar-striped progress-bar-animated bg-warning';

        const message = `
            🔥 <strong>¡Ya casi terminas!</strong><br>
            Alcanzaste el ${percentage}% del proceso.<br>
            <strong>Falta solo 1 paso para ver tu resultado.</strong>
        `;

        motivationalMessageEl.innerHTML = message;
    }

    generateProgress();
};
</script>

</body>
</html>
