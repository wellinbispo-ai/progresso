<script>
    const progressBar = document.getElementById('flowProgress');
    const progressPercentageEl = document.getElementById('progressPercentage');
    const progressValuesEl = document.getElementById('progressValues');
    const motivationalMessageEl = document.getElementById('motivationalMessage');

    const TOTAL_STEPS = 4;

    // 👉 MUDE AQUI (2 ou 3 dependendo da etapa)
    const CURRENT_STEP = 3;

    function getRandom(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function setSmartProgress(step) {

        let percentage = 0;
        let message = '';

        if (step === 2) {
            percentage = getRandom(68, 75);

            message = `
                ⚡ <strong>Você já passou da metade!</strong><br>
                Continue... seu resultado já está sendo preparado.
            `;
        }

        if (step === 3) {
            percentage = getRandom(80, 87);

            message = `
                🔥 <strong>Falta só 1 passo!</strong><br>
                Finalize agora para desbloquear seu resultado completo.
            `;
        }

        progressBar.style.width = percentage + '%';
        progressPercentageEl.textContent = percentage + '%';
        progressValuesEl.textContent = `Paso ${step} de ${TOTAL_STEPS}`;

        progressBar.className = 'progress-bar progress-bar-striped progress-bar-animated bg-info';

        motivationalMessageEl.innerHTML = message;
    }

    document.addEventListener('DOMContentLoaded', () => {
        setSmartProgress(CURRENT_STEP);
    });
</script>
